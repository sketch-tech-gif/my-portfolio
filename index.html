<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kangogo Evans | Full-Stack Developer</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ✅ FIXED NAVBAR (REAL FIX) */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: white;
    z-index: 1000;
}

/* Prevent content hiding under navbar */
body {
    padding-top: 80px;
}

/* NAVBAR STRUCTURE */
.navbar-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
}

.logo {
    font-weight: 700;
    font-size: 1.3rem;
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 2rem;
}

.nav-links a {
    text-decoration: none;
    color: #374151;
    font-weight: 500;
}

.nav-links a:hover {
    color: #2563eb;
}

.menu-toggle {
    display: none;
    font-size: 1.8rem;
    cursor: pointer;
    background: none;
    border: none;
}

/* MOBILE */
@media (max-width: 768px) {
    .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        right: 1.5rem;
        background: white;
        flex-direction: column;
        min-width: 180px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        border-radius: 8px;
        padding: 0.5rem 0;
    }

    .nav-links.active {
        display: flex;
    }

    .nav-links a {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #eee;
    }

    .menu-toggle {
        display: block;
    }
}

/* PROJECTS (unchanged) */
#projects { padding: 60px 20px; text-align: center; }
.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1200px;
    margin: 0 auto;
}
.project-card {
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    padding: 20px;
    transition: 0.25s;
}
.project-card:hover { transform: translateY(-5px); }
</style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">

<!-- ✅ FIXED NAVBAR -->
<nav class="navbar">
    <div class="navbar-inner">
        <div class="logo">Kangogo Evans</div>

        <button class="menu-toggle" id="mobile-menu">☰</button>

        <ul class="nav-links" id="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#projects">My Work</a></li>
            <li><a href="#contact">Contact Me</a></li>
        </ul>
    </div>
</nav>

<!-- CONTENT -->
<main class="max-w-4xl mx-auto px-6 py-12 space-y-12">

<section id="about" class="text-center">
    <div class="bg-white p-12 rounded-2xl shadow-lg">
        <h2 class="text-3xl font-bold">KANGOGO EVANS</h2>
        <p class="text-gray-600 mt-4">Full-Stack Developer</p>
    </div>
</section>

<section id="skills">
    <h2 class="text-2xl font-bold">Skills</h2>
</section>

<section id="projects">
    <h2 class="text-2xl font-bold">Projects</h2>
    <div class="projects-grid">
        <div class="project-card">Project 1</div>
        <div class="project-card">Project 2</div>
    </div>
</section>

<section id="contact">
    <h2 class="text-2xl font-bold">Contact</h2>
</section>

</main>

<script>
const menuToggle = document.getElementById('mobile-menu');
const navLinks = document.getElementById('nav-links');

menuToggle.addEventListener('click', () => {
    navLinks.classList.toggle('active');
});
</script>

</body>
</html>
